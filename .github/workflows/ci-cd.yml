name: SmartPark CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: mrabethedi0
  FRONTEND_IMAGE: mrabethedi0/smartpark-frontend
  BACKEND_IMAGE: mrabethedi0/smartpark-backend

jobs:

  # ══════════════════════════════════════
  # JOB 1 : BUILD FRONTEND
  # ══════════════════════════════════════
  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build Angular
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ══════════════════════════════════════
  # JOB 2 : BUILD BACKEND
  # ══════════════════════════════════════
  build-backend:
    name: Build Backend (Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ══════════════════════════════════════
  # JOB 3 : DOCKER BUILD & PUSH
  # ══════════════════════════════════════
  docker-build-push:
    name: Docker Build & Push to Hub
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  # ══════════════════════════════════════
  # JOB 4 : DEPLOY TO KUBERNETES
  # ══════════════════════════════════════
  deploy-kubernetes:
    name: Deploy to Kubernetes (OpenStack)
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K8S_SSH_KEY }}" > ~/.ssh/k8s-key
          chmod 600 ~/.ssh/k8s-key
          ssh-keyscan -H 192.168.1.131 >> ~/.ssh/known_hosts

      - name: Copy K8s manifests to Master
        run: |
          scp -i ~/.ssh/k8s-key -r k8s/ \
            ubuntu@192.168.1.131:~/smartpark-k8s-ci/

      - name: Deploy to Kubernetes
        run: |
          ssh -i ~/.ssh/k8s-key ubuntu@192.168.1.131 '
            cd ~/smartpark-k8s-ci
            kubectl apply -f 00-namespace.yaml
            kubectl apply -f 01-configmap.yaml
            kubectl apply -f 02-secret.yaml
            kubectl apply -f 03-mongodb.yaml
            kubectl apply -f 04-backend.yaml
            kubectl apply -f 05-frontend.yaml
            kubectl apply -f 06-hpa.yaml
            kubectl rollout restart deployment/smartpark-backend -n smartpark
            kubectl rollout restart deployment/smartpark-frontend -n smartpark
            echo "Deployment done!"
            kubectl get pods -n smartpark
          '

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/k8s-key ubuntu@192.168.1.131 '
            kubectl rollout status deployment/smartpark-backend \
              -n smartpark --timeout=300s
            kubectl rollout status deployment/smartpark-frontend \
              -n smartpark --timeout=120s
            echo "All deployments successful!"
          '