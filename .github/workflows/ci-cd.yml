name: SmartPark CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: mrabethedi0
  FRONTEND_IMAGE: mrabethedi0/smartpark-frontend
  BACKEND_IMAGE: mrabethedi0/smartpark-backend

jobs:

  # ══════════════════════════════════════
  # JOB 1 : BUILD FRONTEND (Cloud GitHub)
  # ══════════════════════════════════════
  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build Angular
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ══════════════════════════════════════
  # JOB 2 : BUILD BACKEND (Cloud GitHub)
  # ══════════════════════════════════════
  build-backend:
    name: Build Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ══════════════════════════════════════
  # JOB 3 : DOCKER BUILD & PUSH (Cloud GitHub)
  # ══════════════════════════════════════
  docker-build-push:
    name: Docker Build & Push to Hub
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare directories
        run: |
          mkdir -p frontend/dist && cp -r artifacts/frontend-dist/* frontend/dist/
          mkdir -p backend/target && cp artifacts/backend-jar/*.jar backend/target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:latest ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:latest
          docker build -t ${{ env.BACKEND_IMAGE }}:v2 ./backend
          docker push ${{ env.BACKEND_IMAGE }}:v2

  # ══════════════════════════════════════
  # JOB 4 : DEPLOY (SUR LE MASTER)
  # ══════════════════════════════════════
  deploy-kubernetes:
    name: Deploy to Kubernetes (Master Node)
    runs-on: self-hosted
    needs: [docker-build-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to K8s
        run: |
          cd k8s/
          kubectl apply -f 00-namespace.yaml
          kubectl apply -f 01-configmap.yaml
          kubectl apply -f 02-secret.yaml
          kubectl apply -f 03-mongodb.yaml
          kubectl apply -f 04-backend.yaml
          kubectl apply -f 05-frontend.yaml
          kubectl apply -f 06-hpa.yaml
          
          # Force la mise à jour des images
          kubectl rollout restart deployment/smartpark-backend -n smartpark
          kubectl rollout restart deployment/smartpark-frontend -n smartpark

      - name: Verify status
        run: kubectl get pods -n smartpark

  #madame 